<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBSE Class 3 Kids Learning Quest! 🎒</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <style>
        body { 
            background-color: #0f172a; 
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .pop-effect { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .shake-effect { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- AUTHENTIC CBSE 2026-27 SYLLABUS DATA ---
        const GAME_DATA = {
            math: {
                title: "Maths Mela 🧮",
                themeColor: "from-amber-400 to-orange-500",
                borderColor: "border-orange-400",
                btnColor: "bg-amber-500 hover:bg-amber-400 shadow-[0_4px_0_#b45309] sm:shadow-[0_6px_0_#b45309]",
                lang: "en-IN",
                levels: [
                    {
                        levelNum: 1,
                        name: "House of Hundreds",
                        questions: [
                            { q: "What is the place value of 7 in 752?", a: "700", opts: ["7", "70", "700", "2"] },
                            { q: "Which number comes right after 999?", a: "1000", opts: ["990", "1001", "1000", "900"] },
                            { q: "Add a Double Century (200) + 50 runs. What is the score?", a: "250", opts: ["150", "250", "200", "300"] }
                        ]
                    },
                    {
                        levelNum: 2,
                        name: "Fun with Shapes",
                        questions: [
                            { q: "How many sides does a triangle have?", a: "3", opts: ["4", "3", "5", "0"] },
                            { q: "A ball is shaped like a...", a: "Sphere", opts: ["Cube", "Cone", "Sphere", "Square"] },
                            { q: "Which of these is a 2D flat shape?", a: "Rectangle", opts: ["Cylinder", "Rectangle", "Box", "Pyramid"] }
                        ]
                    },
                    {
                        levelNum: 3,
                        name: "Time & Give and Take",
                        questions: [
                            { q: "If the short hand is on 4 and the long hand is on 12, what time is it?", a: "4 O'Clock", opts: ["12 O'Clock", "4:30", "4 O'Clock", "4:15"] },
                            { q: "Raju has 340 marbles. He gives 120 to his friend. How many are left?", a: "220", opts: ["240", "460", "220", "200"] },
                            { q: "There are 7 days in a week. How many days in 4 weeks?", a: "28", opts: ["21", "28", "24", "30"] }
                        ]
                    }
                ]
            },
            evs: {
                title: "Our Wondrous World 🌿",
                themeColor: "from-green-400 to-emerald-600",
                borderColor: "border-emerald-500",
                btnColor: "bg-emerald-500 hover:bg-emerald-400 shadow-[0_4px_0_#047857] sm:shadow-[0_6px_0_#047857]",
                lang: "en-IN",
                levels: [
                    {
                        levelNum: 1,
                        name: "Family and Friends",
                        questions: [
                            { q: "Your father's brother is called your...", a: "Uncle", opts: ["Uncle", "Grandfather", "Cousin", "Brother"] },
                            { q: "Where do we go to buy lots of toys and see magic shows?", a: "Mela (Fair)", opts: ["Hospital", "Mela (Fair)", "Bank", "Post Office"] },
                            { q: "Which festival is known as the festival of colors?", a: "Holi", opts: ["Diwali", "Holi", "Eid", "Christmas"] }
                        ]
                    },
                    {
                        levelNum: 2,
                        name: "Getting to Know Plants",
                        questions: [
                            { q: "Which part of the plant grows under the soil?", a: "Roots", opts: ["Leaves", "Roots", "Flowers", "Stem"] },
                            { q: "What do green plants need to make their food?", a: "Sunlight", opts: ["Moonlight", "Sunlight", "Milk", "Sand"] },
                            { q: "Which of these is a big, strong plant called a tree?", a: "Mango", opts: ["Rose", "Tulsi", "Mango", "Grass"] }
                        ]
                    },
                    {
                        levelNum: 3,
                        name: "Water and Food",
                        questions: [
                            { q: "What is the main natural source of water on Earth?", a: "Rain", opts: ["Tap", "Well", "Rain", "Bottle"] },
                            { q: "Which of these foods gives us energy to play and study?", a: "Rice and Roti", opts: ["Cold Drinks", "Rice and Roti", "Chips", "Candy"] },
                            { q: "We must always _____ water before drinking to kill germs.", a: "Boil or Filter", opts: ["Freeze", "Boil or Filter", "Color", "Spill"] }
                        ]
                    }
                ]
            },
            english: {
                title: "Santoor Words 🗣️",
                themeColor: "from-cyan-400 to-blue-600",
                borderColor: "border-blue-500",
                btnColor: "bg-blue-500 hover:bg-blue-400 shadow-[0_4px_0_#1d4ed8] sm:shadow-[0_6px_0_#1d4ed8]",
                lang: "en-IN",
                levels: [
                    {
                        levelNum: 1,
                        name: "Fun with Friends",
                        questions: [
                            { q: "Identify the naming word (Noun) in: 'Moti is a smart dog.'", a: "Moti and dog", opts: ["is", "Moti and dog", "smart", "a"] },
                            { q: "What is the opposite of 'Happy'?", a: "Sad", opts: ["Glad", "Joy", "Sad", "Laugh"] },
                            { q: "The sky is blue and the grass is ______.", a: "Green", opts: ["Red", "Green", "Yellow", "Pink"] }
                        ]
                    },
                    {
                        levelNum: 2,
                        name: "Toys and Games",
                        questions: [
                            { q: "Find the action word (Verb): 'The kids are playing in the garden.'", a: "playing", opts: ["kids", "garden", "in", "playing"] },
                            { q: "A paper boat floats _____ the water.", a: "on", opts: ["under", "on", "behind", "into"] },
                            { q: "Which is the correct spelling?", a: "Beautiful", opts: ["Beutiful", "Beautiful", "Beautifull", "Byutiful"] }
                        ]
                    },
                    {
                        levelNum: 3,
                        name: "The Sky & Chandrayaan",
                        questions: [
                            { q: "Who counts the stars in the night sky?", a: "Chanda Mama", opts: ["The Sun", "Chanda Mama", "Clouds", "Rain"] },
                            { q: "India sent Chandrayaan to explore which place?", a: "The Moon", opts: ["The Sun", "Mars", "The Moon", "Jupiter"] },
                            { q: "Join these sentences: 'I looked up. I saw the moon.'", a: "I looked up and saw the moon.", opts: ["I looked up but saw the moon.", "I looked up and saw the moon.", "I looked up or saw the moon.", "I looked up because saw the moon."] }
                        ]
                    }
                ]
            },
            hindi: {
                title: "वीणा (Veena) 👑",
                themeColor: "from-rose-400 to-pink-600",
                borderColor: "border-pink-500",
                btnColor: "bg-pink-500 hover:bg-pink-400 shadow-[0_4px_0_#be123c] sm:shadow-[0_6px_0_#be123c]",
                lang: "hi-IN",
                levels: [
                    {
                        levelNum: 1,
                        name: "हमारा पर्यावरण (Environment)",
                        questions: [
                            { q: "चिड़िया अपना घोंसला कहाँ बनाती है?", a: "पेड़ पर", opts: ["पानी में", "पेड़ पर", "आसमान में", "गुफा में"] },
                            { q: "'आम का पेड़' कहानी में आम का रंग कैसा होता है?", a: "पीला", opts: ["नीला", "पीला", "काला", "सफ़ेद"] },
                            { q: "इनमें से कौन सा अक्षर एक स्वर है?", a: "अ", opts: ["क", "प", "अ", "म"] }
                        ]
                    },
                    {
                        levelNum: 2,
                        name: "हमारे मित्र (Our Friends)",
                        questions: [
                            { q: "बीरबल अपनी किस चीज़ के लिए प्रसिद्ध थे?", a: "बुद्धिमानी", opts: ["गुस्सा", "बुद्धिमानी", "दौड़", "रोना"] },
                            { q: "'चतुर' का अर्थ (Meaning) क्या होता है?", a: "चालाक (Clever)", opts: ["बेवकूफ", "चालाक (Clever)", "मोटा", "छोटा"] },
                            { q: "'लड़का' का स्त्रीलिंग (Gender) क्या होगा?", a: "लड़की", opts: ["बहन", "माता", "औरत", "लड़की"] }
                        ]
                    },
                    {
                        levelNum: 3,
                        name: "आओ खेलें (Let's Play)",
                        questions: [
                            { q: "'किताब' का बहुवचन (Plural) क्या होगा?", a: "किताबें", opts: ["किताबों", "किताबें", "कापी", "पन्ने"] },
                            { q: "रस्साकशी (Tug of War) खेल में किस चीज़ की ज़रूरत होती है?", a: "रस्सी", opts: ["गेंद", "बल्ला", "रस्सी", "छड़ी"] },
                            { q: "सही वाक्य चुनिए:", a: "मैं खेल रहा हूँ।", opts: ["मैं खेल रही हैं।", "मैं खेल रहा हूँ।", "मैं खेलते है।", "हम खेल रहा है।"] }
                        ]
                    }
                ]
            }
        };

        function CBSEKidApp() {
            // Audio Security Unlock State
            const [audioUnlocked, setAudioUnlocked] = useState(false);
            
            // Game States
            const [currentSubject, setCurrentSubject] = useState("math");
            const [levelIndices, setLevelIndices] = useState({ math: 0, evs: 0, english: 0, hindi: 0 });
            const [questionIndex, setQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [feedback, setFeedback] = useState("Tap the speaker button to hear the question! 🔊");
            const [feedbackState, setFeedbackState] = useState("neutral");
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [cardAnimClass, setCardAnimClass] = useState("");

            // Setup Voices safely
            useEffect(() => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices();
                    window.speechSynthesis.onvoiceschanged = () => {
                        window.speechSynthesis.getVoices();
                    };
                }
            }, []);

            // Secure Audio Engine - Optimized for Mobile Interactions
            const speakText = (text, customLang) => {
                if ('speechSynthesis' in window) {
                    // Fix mobile audio interruption
                    if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                    }
                    
                    const utterance = new SpeechSynthesisUtterance(text);
                    
                    // Critical persistence reference for mobile architectures
                    window.currentUtterance = utterance; 
                    
                    const langCode = customLang || GAME_DATA[currentSubject].lang;
                    utterance.lang = langCode;
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1;

                    const voices = window.speechSynthesis.getVoices();
                    const appropriateVoice = voices.find(v => v.lang.includes(langCode) || v.lang.includes(langCode.split('-')[0]));
                    if (appropriateVoice) {
                        utterance.voice = appropriateVoice;
                    }

                    // On iOS Safari, spoken events must directly originate from a click interaction
                    if (audioUnlocked) {
                        window.speechSynthesis.speak(utterance);
                    }
                }
            };

            const unlockAudioAndStart = () => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance('Welcome to CBSE Quest Box!');
                    window.currentUtterance = u;
                    u.rate = 1.2;
                    window.speechSynthesis.speak(u);
                }
                setAudioUnlocked(true);
            };

            const subjectData = GAME_DATA[currentSubject];
            const currentLevelIndex = levelIndices[currentSubject];
            const currentLevel = subjectData.levels[currentLevelIndex];
            const currentQuestion = currentLevel.questions[questionIndex];

            // Trigger reading on question change safely
            useEffect(() => {
                if (currentQuestion && audioUnlocked) {
                    setFeedback(currentSubject === "hindi" ? "सवाल सुनने के लिए स्पीकर बटन दबाएं! 🔊" : "Press the speaker button to hear the question! 🔊");
                    setFeedbackState("neutral");
                    setSelectedAnswer(null);
                    setCardAnimClass("pop-effect");
                    
                    // Small speech pause to prevent immediate mobile audio collision
                    const timeout = setTimeout(() => {
                        speakText(currentQuestion.q);
                    }, 300);
                    
                    const timer = setTimeout(() => setCardAnimClass(""), 500);
                    return () => {
                        clearTimeout(timer);
                        clearTimeout(timeout);
                    };
                }
            }, [currentSubject, currentLevelIndex, questionIndex, audioUnlocked]);

            const handleSpeakClick = () => {
                if (currentQuestion) {
                    speakText(currentQuestion.q);
                }
            };

            const handleOptionSelection = (option) => {
                if (selectedAnswer !== null) return;
                setSelectedAnswer(option);

                if (option === currentQuestion.a) {
                    const addedPoints = 10 + (streak * 2);
                    setScore(prev => prev + addedPoints);
                    setStreak(prev => prev + 1);
                    setFeedbackState("correct");
                    setFeedback(currentSubject === "hindi" ? `शाबाश! +${addedPoints} अंक 🎉` : `Fantastic! +${addedPoints} XP! 🎉`);
                    speakText(currentSubject === "hindi" ? "सही उत्तर" : "Awesome!");

                    setTimeout(() => moveToNextQuestion(), 1800);
                } else {
                    setStreak(0);
                    setFeedbackState("wrong");
                    setFeedback(currentSubject === "hindi" ? `ओह! सही उत्तर '${currentQuestion.a}' था।` : `Oops! Answer was '${currentQuestion.a}'`);
                    speakText(currentSubject === "hindi" ? "गलत उत्तर" : "Let's try another one!");
                    setCardAnimClass("shake-effect");
                    
                    setTimeout(() => {
                        setCardAnimClass("");
                        moveToNextQuestion();
                    }, 2500);
                }
            };

            const moveToNextQuestion = () => {
                if (questionIndex + 1 < currentLevel.questions.length) {
                    setQuestionIndex(prev => prev + 1);
                } else {
                    if (currentLevelIndex + 1 < subjectData.levels.length) {
                        setLevelIndices(prev => ({ ...prev, [currentSubject]: prev[currentSubject] + 1 }));
                        setQuestionIndex(0);
                        setFeedback(currentSubject === "hindi" ? "नया स्तर! 🌟" : "Level Up! 🌟");
                        speakText(currentSubject === "hindi" ? "नया स्तर" : "Level Up!");
                    } else {
                        setQuestionIndex(0);
                        setFeedback(currentSubject === "hindi" ? "अद्भुत! आपने पूरा कर लिया! 🏆" : "Subject Mastered! 🏆");
                        speakText(currentSubject === "hindi" ? "बधाई हो" : "Subject Mastered!");
                    }
                }
            };

            const handleSubjectChange = (subKey) => {
                window.speechSynthesis.cancel();
                setCurrentSubject(subKey);
                setQuestionIndex(0);
                setStreak(0);
                // Announce new subject for accessibility/TTS feedback
                speakText(GAME_DATA[subKey].title);
            };

            // If audio isn't unlocked, show the Start screen to satisfy browser security
            if (!audioUnlocked) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 text-center">
                        <div className="bg-slate-800 p-6 sm:p-10 rounded-3xl border-4 border-cyan-500 shadow-[0_0_40px_rgba(34,211,238,0.3)] w-full max-w-md">
                            <h1 className="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-pink-400 mb-4 leading-tight">CBSE Quest Box</h1>
                            <p className="text-lg sm:text-xl text-slate-300 mb-8">Ready to learn with Maths Mela & Santoor?</p>
                            <button 
                                onClick={unlockAudioAndStart}
                                className="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black text-xl sm:text-2xl py-4 px-6 rounded-2xl transition-all transform hover:-translate-y-1 active:translate-y-2 shadow-[0_6px_0_#0891b2] active:shadow-[0_0px_0_#0891b2]"
                            >
                                Start Game! 🔊
                            </button>
                        </div>
                    </div>
                );
            }

            const progressPercentage = ((questionIndex) / currentLevel.questions.length) * 100;

            return (
                <div className="min-h-screen flex flex-col items-center justify-start p-3 sm:p-6 text-white max-w-2xl mx-auto w-full">
                    
                    <div className="text-center my-3 sm:my-4 w-full">
                        <h1 className="text-2xl sm:text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-yellow-300 to-pink-400 drop-shadow-md">
                            CBSE 2026-27 Quest 🚀
                        </h1>
                    </div>

                    {/* SUBJECT SELECTION PANEL (Fixed Layout Padding & Margins to isolate touch area) */}
                    <div className="w-full grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 relative z-10">
                        {Object.keys(GAME_DATA).map((key) => {
                            const active = currentSubject === key;
                            return (
                                <button
                                    key={key}
                                    onClick={() => handleSubjectChange(key)}
                                    className={`py-4 px-2 rounded-2xl font-bold text-sm sm:text-base capitalize transition-all transform active:scale-95 flex flex-col items-center justify-center border-2 cursor-pointer touch-manipulation ${
                                        active 
                                        ? `bg-slate-800 text-white border-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.5)]` 
                                        : 'bg-slate-900 border-transparent text-slate-400 hover:text-white'
                                    }`}
                                >
                                    <span>{GAME_DATA[key].title.split(" ")[0]}</span>
                                </button>
                            );
                        })}
                    </div>

                    <div className="w-full bg-slate-900/90 border border-slate-700/60 rounded-3xl p-3 sm:p-4 flex flex-row justify-between items-center mb-4">
                        <div className="flex flex-col flex-1">
                            <span className="text-[10px] sm:text-xs text-slate-400 uppercase tracking-widest font-semibold">Rank</span>
                            <span className="text-sm sm:text-lg font-black text-cyan-300 leading-tight">Lvl {currentLevel.levelNum}: {currentLevel.name}</span>
                        </div>
                        <div className="text-right flex flex-col sm:flex-row items-end sm:items-center gap-1 sm:gap-3 ml-2">
                            <div className="flex flex-col items-end">
                                <span className="text-[10px] sm:text-xs text-slate-400 uppercase font-semibold">Total XP</span>
                                <span className="text-xl sm:text-2xl font-black text-yellow-400 leading-none">{score} ⭐</span>
                            </div>
                            {streak > 1 && (
                                <div className="bg-orange-500/20 text-orange-400 border border-orange-500/40 font-black px-2 py-1 rounded-lg sm:rounded-xl text-xs sm:text-sm animate-bounce mt-1 sm:mt-0">
                                    {streak}x 🔥
                                </div>
                            )}
                        </div>
                    </div>

                    <div className={`w-full bg-gradient-to-b ${subjectData.themeColor} rounded-[2rem] sm:rounded-[2.5rem] p-1 sm:p-1.5 ${subjectData.borderColor} shadow-xl sm:shadow-2xl flex-1 flex flex-col`}>
                        <div className={`bg-slate-900 w-full h-full rounded-[1.8rem] sm:rounded-[2.3rem] p-4 sm:p-6 text-center border-t-4 border-slate-800 flex flex-col justify-between items-center min-h-[350px] sm:min-h-[400px] flex-1 ${cardAnimClass}`}>
                            
                            <div className="w-full flex flex-col items-center">
                                <button 
                                    onClick={handleSpeakClick}
                                    className="bg-slate-800 hover:bg-slate-700 p-3 sm:p-4 rounded-full mb-3 sm:mb-4 border border-slate-700 shadow-md group active:scale-95 transition-transform touch-manipulation"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 sm:h-8 sm:w-8 text-cyan-400 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                                    </svg>
                                </button>
                                
                                <h2 className="text-xl sm:text-2xl md:text-3xl font-extrabold text-white leading-snug px-1 sm:px-2">
                                    {currentQuestion.q}
                                </h2>
                            </div>

                            <div className="w-full bg-slate-800 h-2 sm:h-3 rounded-full my-5 sm:my-6 overflow-hidden max-w-sm">
                                <div className="bg-gradient-to-r from-cyan-400 to-indigo-500 h-full transition-all duration-500" style={{ width: `${progressPercentage || 5}%` }}></div>
                            </div>

                            <div className="w-full grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 my-1 sm:my-2 relative z-10">
                                {currentQuestion.opts.map((option, index) => {
                                    let btnStyle = subjectData.btnColor;
                                    
                                    if (selectedAnswer !== null) {
                                        if (option === currentQuestion.a) {
                                            btnStyle = "bg-green-500 text-white shadow-[0_4px_0_#15803d] sm:shadow-[0_6px_0_#15803d]";
                                        } else if (selectedAnswer === option) {
                                            btnStyle = "bg-red-500 text-white shadow-[0_4px_0_#b91c1c] sm:shadow-[0_6px_0_#b91c1c]";
                                        } else {
                                            btnStyle = "bg-slate-800 text-slate-500 opacity-40 shadow-none border border-transparent";
                                        }
                                    }

                                    return (
                                        <button
                                            key={index}
                                            disabled={selectedAnswer !== null}
                                            onClick={() => handleOptionSelection(option)}
                                            className={`text-base sm:text-lg font-bold py-4 px-4 rounded-xl sm:rounded-2xl transition-all transform active:translate-y-1 active:shadow-none border-b-4 border-black/30 text-white cursor-pointer touch-manipulation ${btnStyle}`}
                                        >
                                            {option}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className={`mt-3 sm:mt-4 text-sm sm:text-base md:text-lg font-bold min-h-[24px] sm:min-h-[30px] ${feedbackState === "correct" ? "text-green-400" : feedbackState === "wrong" ? "text-red-400" : "text-cyan-300"}`}>
                                {feedback}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CBSEKidApp />);
    </script>
</body>
</html>
